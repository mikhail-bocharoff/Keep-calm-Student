services:
  - type: web
    name: focusfloat-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./otdohnii.db
      - key: LLM_MODE
        value: api
      - key: LLM_MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
